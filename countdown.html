<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Countdown</title>
  <style>
    body {
      font-family: Segoe UI, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #1f1f1f;
      color: white;
      font-size: 48px;
    }
  </style>
</head>
<body>
  <div id="timer"></div>

  <script>
    const target = new Date("2026-7-27T7:00:00");

    setInterval(() => {
      const now = new Date();
      let diff = target - now;

      if (diff < 0) diff = 0;

      const d = Math.floor(diff / (1000*60*60*24));
      const h = Math.floor(diff / (1000*60*60) % 24);
      const m = Math.floor(diff / (1000*60) % 60);
      const s = Math.floor(diff / 1000 % 60);

      document.getElementById("timer").innerText =
        `${d} : ${h} : ${m} : ${s}`;
    }, 1000);
  </script>
</body>
</html>
